name: Deploy to npm

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC authentication
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check if version exists
        id: check-version
        run: |
          if npm view $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version") > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Publish to npm
        id: publish_step
        if: env.exists == 'false'
        run: npm publish --provenance --access public

      - name: Notify Slack (success)
        if: env.exists == 'false' && steps.publish_step.outcome == 'success'
        env:
          SLACK_DEPLOY_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set; skipping Slack notification"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          version = package["version"]
          package_name = package["name"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          sha = os.environ["GITHUB_SHA"]
          actor = os.environ["GITHUB_ACTOR"]
          server_url = os.environ["GITHUB_SERVER_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]

          changelog = Path("CHANGELOG.md")
          latest_changes = "See CHANGELOG for details."
          section_header = f"## [{version}]"
          if changelog.exists():
              lines = changelog.read_text(encoding="utf-8").splitlines()
              in_target = False
              bullets = []
              for line in lines:
                  if line.startswith(section_header):
                      in_target = True
                      continue
                  if in_target and line.startswith("## ["):
                      break
                  if in_target and line.startswith("- "):
                      bullets.append(line[2:].strip())
              if bullets:
                  latest_changes = "\n".join(f"• {bullet}" for bullet in bullets[:5])

          payload = {
              "text": f"Facturapi Node SDK {version} published to npm",
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": f"Node SDK {version} published to npm"
                      }
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Package:* `{package_name}@{version}`"},
                          {"type": "mrkdwn", "text": f"*Branch:* `{ref_name}`"},
                          {"type": "mrkdwn", "text": f"*Commit:* `{sha}`"},
                          {"type": "mrkdwn", "text": f"*Actor:* `{actor}`"}
                      ]
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "*Useful links*\n"
                              f"• npm: <https://www.npmjs.com/package/{package_name}/v/{version}|View package>\n"
                              f"• Workflow run: <{server_url}/{repo}/actions/runs/{run_id}|Open run>\n"
                              f"• Changelog: <{server_url}/{repo}/blob/{sha}/CHANGELOG.md|Read changes>"
                          )
                      }
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Latest changes*\n{latest_changes}"
                      }
                  }
              ]
          }

          Path("/tmp/slack_payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          curl -sS -X POST -H "Content-type: application/json" --data "@/tmp/slack_payload.json" "$SLACK_DEPLOY_WEBHOOK_URL" || true

      - name: Notify Slack (failure)
        if: failure() && env.exists == 'false' && steps.publish_step.outcome == 'failure'
        env:
          SLACK_DEPLOY_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set; skipping Slack notification"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          package = json.loads(Path("package.json").read_text(encoding="utf-8"))
          version = package["version"]
          server_url = os.environ["GITHUB_SERVER_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          sha = os.environ["GITHUB_SHA"]

          payload = {
              "text": f"Facturapi Node SDK {version} publish failed",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"*Node SDK {version} publish failed*\n"
                              f"• Workflow run: <{server_url}/{repo}/actions/runs/{run_id}|Open run>\n"
                              f"• Commit: `{sha}`"
                          )
                      }
                  }
              ]
          }

          Path("/tmp/slack_payload_failure.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          curl -sS -X POST -H "Content-type: application/json" --data "@/tmp/slack_payload_failure.json" "$SLACK_DEPLOY_WEBHOOK_URL" || true
